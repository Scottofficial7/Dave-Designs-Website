                <script defer="" data-name="navigation-logic">
                  document.addEventListener('DOMContentLoaded', function() {
                    (function(){
                      const navWrapper = document.getElementById("main-navigation")
                      const openBtn = document.getElementById("nav-open")
                      const closeBtn = document.getElementById("nav-close")
                      const mobileMenu = document.getElementById("mobile-menu")
                      const overlayLinks = document.querySelectorAll(".navigation-overlay-link")

                      let lastScrollY = window.scrollY

                      const toggleMenu = (state) => {
                        mobileMenu.classList.toggle("is-active", state)
                        document.body.style.overflow = state ? "hidden" : ""
                        openBtn.setAttribute("aria-expanded", state)
                      }

                      openBtn.addEventListener("click", () => toggleMenu(true))
                      closeBtn.addEventListener("click", () => toggleMenu(false))

                      overlayLinks.forEach((link) => {
                        link.addEventListener("click", () => toggleMenu(false))
                      })

                      window.addEventListener("scroll", () => {
                        const currentScrollY = window.scrollY

                        if (currentScrollY > 100) {
                          if (currentScrollY > lastScrollY) {
                            navWrapper.style.transform = "translateY(-100%)"
                          } else {
                            navWrapper.style.transform = "translateY(0)"
                            navWrapper.style.background = "var(--color-surface)"
                            navWrapper.style.boxShadow = "0 10px 30px -10px rgba(0,0,0,0.5)"
                          }
                        } else {
                          navWrapper.style.transform = "translateY(0)"
                          navWrapper.style.boxShadow = "none"
                          navWrapper.style.background = "var(--color-surface)"
                        }

                        lastScrollY = currentScrollY
                      })

                      // Handle escape key
                      document.addEventListener("keydown", (e) => {
                        if (e.key === "Escape" && mobileMenu.classList.contains("is-active")) {
                          toggleMenu(false)
                        }
                      })
                    })()
                  });
                </script>
